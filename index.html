<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cordoncitos Flojos 🌸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --coral:#c8382b;--coral-bg:#fdf0ef;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-mid:#43a047;
  --orange:#e65100;--orange-bg:#fff3e0;
  --red:#c62828;--red-bg:#ffebee;
  --blue:#1565c0;--blue-bg:#e3f2fd;
  --lav:#5e35b1;--lav-bg:#ede7f6;
  --gold:#f9a825;--gold-bg:#fffde7;
  --teal:#00695c;--teal-bg:#e0f2f1;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --bg:#f7f3ff;--card:#fff;--border:#e0e0e0;
  --sidebar-w:240px;--radius:12px;
}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--bg);min-height:100vh;font-size:14px;color:var(--text)}
#app{min-height:100vh}
.layout{display:flex;min-height:100vh}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:199}
#overlay.show{display:block}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:#1a1a2e;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;overflow-x:hidden}
.sidebar.collapsed{transform:translateX(calc(-1 * var(--sidebar-w)))}
.s-head{padding:13px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:9px}
.s-logo-name{font-size:13px;font-weight:800;color:#fff}
.s-logo-sub{font-size:9px;color:rgba(255,255,255,0.35);margin-top:1px}
.s-user{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:8px}
.s-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,0.1);flex-shrink:0}
.s-uname{color:#fff;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-urole{color:rgba(255,255,255,0.4);font-size:9px}
.nav-group{padding:5px 0}
.nav-group-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.22);padding:6px 14px 2px}
.nav-it{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;color:rgba(255,255,255,0.58);font-size:12px;font-weight:600;border-left:3px solid transparent;transition:all 0.15s;user-select:none;white-space:nowrap}
.nav-it:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-it.active{background:rgba(200,56,43,0.2);color:#ff8070;border-left-color:#c8382b}
.nav-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:#c8382b;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;flex-shrink:0}
.s-bot{padding:10px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto}
.btn-logout{width:100%;padding:8px;background:transparent;border:1px solid rgba(255,255,255,0.13);border-radius:8px;color:rgba(255,255,255,0.45);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.15s}
.btn-logout:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.8)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 0.28s cubic-bezier(0.4,0,0.2,1);margin-left:var(--sidebar-w)}
.main.full{margin-left:0}
.topbar{background:#fff;height:56px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.topbar-left{display:flex;align-items:center;gap:10px}
.menu-toggle{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0}
.menu-toggle span{display:block;width:16px;height:2px;background:var(--text2);border-radius:2px}
.pg-title{font-size:16px;font-weight:800;color:var(--text)}
.pg-sub{font-size:10px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-date{font-size:11px;color:var(--text2);font-weight:600;white-space:nowrap}
.content{padding:14px 16px;flex:1}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 13px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;transition:all 0.15s;text-decoration:none;white-space:nowrap}
.btn-primary{background:var(--coral);color:#fff}.btn-primary:hover{background:#a82e22}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1b5e20}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:#bf360c}
.btn-lav{background:var(--lav);color:#fff}.btn-lav:hover{background:#4527a0}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#0d47a1}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#004d40}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--coral);color:var(--coral)}
.btn-danger{background:#c62828;color:#fff}.btn-danger:hover{background:#a31515}
.btn-wa{background:#25D366;color:#fff;border:none;display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none}
.btn-wa:hover{background:#1aad54}
.btn-sm{padding:5px 9px;font-size:11px;border-radius:7px}
.btn-xs{padding:3px 7px;font-size:10px;border-radius:6px}
.btn-full{width:100%}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-weight:800;font-size:13px;color:var(--text)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.g4,.g3,.g2{grid-template-columns:1fr}}

/* ── STATS ── */
.stat{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px}
.stat-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:900;line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;padding:9px 10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:9px 10px;font-size:12px;border-bottom:1px solid #f5f5f5;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-orange{background:var(--orange-bg);color:var(--orange)}
.b-lav{background:var(--lav-bg);color:var(--lav)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-gold{background:var(--gold-bg);color:#8c6d00}
.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-gray{background:#f0f0f0;color:#666}

/* ── PILL ── */
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}

/* ── HOURS BAR ── */
.hours-bar{width:100%;background:#eee;border-radius:6px;height:6px;overflow:hidden;margin-top:3px}
.hours-fill{height:100%;border-radius:6px;transition:width 0.4s}
.hf-ok{background:var(--green-mid)}
.hf-warn{background:var(--gold)}
.hf-over{background:var(--red)}

/* ── SCANNER SECTION ── */
.scanner-box{background:#1a1a2e;border-radius:var(--radius);padding:20px;color:#fff;text-align:center;position:relative;overflow:hidden}
.scanner-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--coral),var(--lav),var(--coral));background-size:200%;animation:scanline 2s linear infinite}
@keyframes scanline{0%{background-position:0%}100%{background-position:200%}}
.scanner-input{background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-family:inherit;font-size:16px;padding:12px 16px;width:100%;text-align:center;outline:none;caret-color:#ff8070}
.scanner-input::placeholder{color:rgba(255,255,255,0.3);font-size:13px}
.scanner-input:focus{border-color:#ff8070;background:rgba(255,255,255,0.13)}
.scan-result{margin-top:14px;padding:14px;border-radius:10px;animation:popIn 0.3s ease}
.scan-result.entrada{background:rgba(46,125,50,0.25);border:1px solid rgba(46,125,50,0.4)}
.scan-result.salida{background:rgba(230,81,0,0.25);border:1px solid rgba(230,81,0,0.4)}
.scan-result.error{background:rgba(198,40,40,0.25);border:1px solid rgba(198,40,40,0.4)}
@keyframes popIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.scan-name{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.scan-info{font-size:12px;color:rgba(255,255,255,0.7)}

/* ── BARCODE ── */
.barcode-container{background:#fff;padding:8px;border-radius:8px;display:inline-block;border:1px solid var(--border)}
.bc-bars{display:flex;align-items:flex-end;gap:0;height:40px}
.bc-bar{background:#000;display:inline-block}
.bc-num{font-family:monospace;font-size:9px;letter-spacing:1px;text-align:center;margin-top:3px;color:#333}

/* ── PRINT MODAL ── */
.print-card{background:#fff;border-radius:16px;padding:24px;text-align:center;max-width:280px;margin:0 auto}
.print-name{font-size:18px;font-weight:900;color:var(--text);margin-bottom:2px}
.print-info{font-size:11px;color:var(--text3);margin-bottom:12px}
@media print{
  body *{visibility:hidden}
  .print-area,  .print-area *{visibility:visible}
  .print-area{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%)}
}

/* ── ATTENDANCE LOG ── */
.log-entry{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--card);border:1px solid var(--border);margin-bottom:6px}
.log-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.log-dot.entrada{background:var(--green)}
.log-dot.salida{background:var(--orange)}
.log-info{flex:1;min-width:0}
.log-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:10px;color:var(--text3)}
.log-badge{flex-shrink:0}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:flex-end;justify-content:center;z-index:500;padding:0}
@media(min-width:600px){.modal-bg{align-items:center;padding:20px}}
.modal{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
@media(min-width:600px){.modal{border-radius:16px}}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-t{font-size:16px;font-weight:800}
.modal-x{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-bd{padding:16px 18px}
.modal-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}

/* ── FORM ── */
.fgrp{margin-bottom:10px}
.fgrp label{display:block;font-weight:700;font-size:11px;margin-bottom:4px;color:var(--text)}
.fgrp input,.fgrp select,.fgrp textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;outline:none;color:var(--text);background:#fff;-webkit-appearance:none}
.fgrp input:focus,.fgrp select:focus,.fgrp textarea:focus{border-color:var(--coral)}
.fgrp-row{display:flex;gap:8px}
.fgrp-row .fgrp{flex:1}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#fdf0ef 0%,#f7f3ff 50%,#e8f5e9 100%);padding:16px}
.login-card{background:#fff;border-radius:18px;padding:30px 26px;width:100%;max-width:320px;box-shadow:0 16px 48px rgba(0,0,0,0.12)}
.login-logo{text-align:center;margin-bottom:20px}
.login-t{font-size:21px;font-weight:900;color:var(--coral);line-height:1.1}
.login-s{color:var(--text3);font-size:11px;margin-top:3px}
.login-err{background:var(--coral-bg);color:var(--coral);padding:7px 11px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.demo-box{margin-top:12px;padding:10px;background:#f8f8f8;border-radius:8px;font-size:10px;color:var(--text3);line-height:1.9}

/* ── TOAST ── */
.toast{position:fixed;bottom:16px;right:16px;left:auto;background:#1a1a2e;color:#fff;padding:10px 15px;border-radius:10px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:9999;animation:tin 0.25s ease;display:flex;align-items:center;gap:8px;max-width:300px}
@keyframes tin{from{opacity:0;transform:translateY(10px)}}

/* ── CURSO CARDS ── */
.curso-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.curso-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.1)}
.curso-banner{height:62px;display:flex;align-items:center;justify-content:center;font-size:32px}
.curso-info{padding:10px 12px}
.curso-nm{font-size:14px;font-weight:800}
.curso-mt{font-size:10px;color:var(--text3);margin-top:2px}
.curso-pills{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}

/* ── SALA SELECTOR ── */
.sala-selector{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.sala-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--text2);transition:all 0.15s}
.sala-btn:hover{border-color:var(--coral);color:var(--coral)}
.sala-btn.active{background:var(--coral);border-color:var(--coral);color:#fff}

/* ── TABS ── */
.tabs{display:flex;gap:2px;background:#e8e8e8;padding:3px;border-radius:9px;margin-bottom:12px;overflow-x:auto}
.tab{flex:1;min-width:70px;padding:6px 8px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap}
.tab.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.tab-c{background:var(--coral);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px}

/* ── REP CARDS ── */
.rep-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);border-left:4px solid;margin-bottom:8px}
.rep-card.nuevo{border-left-color:var(--coral)}
.rep-card.proceso{border-left-color:var(--orange)}
.rep-card.resuelto{border-left-color:var(--green)}
.rep-hd{padding:10px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.rep-nm{font-weight:800;font-size:12px}
.rep-mt{font-size:10px;color:var(--text3);margin-top:2px}
.rep-txt{padding:0 14px 8px;font-size:12px;color:var(--text2)}
.rep-act{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ── NOTA ── */
.nota-in{border:1.5px dashed var(--border);border-radius:7px;padding:5px 7px;font-family:inherit;font-size:11px;width:130px;outline:none;resize:none;color:var(--text)}
.nota-in:focus{border-color:var(--lav);border-style:solid}
.nota-tag{background:var(--lav-bg);color:var(--lav);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block}

/* ── MA CARD ── */
.ma-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);text-align:center;overflow:hidden}
.ma-body{padding:16px}
.ma-foot{padding:8px 10px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:center}

/* ── HIGHLIGHT EXCEEDED ── */
tr.exceeded td{background:#fff5f5}
tr.exceeded td:first-child{border-left:3px solid var(--red)}

/* ── SCROLL ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 16px;color:var(--text2)}
.empty-ico{font-size:44px;display:block;margin-bottom:8px}
.empty h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}

/* ── ATT BUTTONS ── */
.att-wrap{display:flex;gap:3px;flex-wrap:wrap}
.att-btn{padding:4px 8px;border-radius:6px;border:1.5px solid;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;background:transparent;transition:all 0.12s}
.att-p{border-color:var(--green);color:var(--green)}.att-p.on,.att-p:hover{background:var(--green);color:#fff}
.att-a{border-color:var(--coral);color:var(--coral)}.att-a.on,.att-a:hover{background:var(--coral);color:#fff}
.att-t{border-color:var(--orange);color:var(--orange)}.att-t.on,.att-t:hover{background:var(--orange);color:#fff}

/* ── BC ── */
.bc{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);margin-bottom:2px;flex-wrap:wrap}
.bc-lnk{cursor:pointer}.bc-lnk:hover{color:var(--coral)}
.bc-cur{color:var(--text);font-weight:700}

/* ── ALERT BOX ── */
.alert-box{border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-warn{background:var(--gold-bg);color:#7a5900;border:1px solid #f9a82533}
.alert-danger{background:var(--red-bg);color:var(--red);border:1px solid #c6282833}
.alert-info{background:var(--blue-bg);color:var(--blue);border:1px solid #1565c033}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid #2e7d3233}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-area"></div>

<script>
// ════════════════════════════════════════════════════════════
// CODE 128B — GENERADOR COMPLETO Y ESTÁNDAR
// Compatible con cualquier lector de código de barras físico.
// Codifica el ID del alumno usando el subconjunto B de Code 128.
// Cada símbolo se representa con 6 elementos (3 barras + 3 espacios),
// cada uno de 1–4 unidades de ancho.
// ════════════════════════════════════════════════════════════

// Tabla completa Code 128 — cada entrada: [b1,s1,b2,s2,b3,s3]
// b=barra, s=espacio  (anchos en unidades mínimas 1-4)
const C128 = [
  [2,1,2,2,2,2],[2,2,2,1,2,2],[2,2,2,2,2,1],[1,2,1,2,2,3],

// Símbolos especiales Code 128
const C128_START_B = 104; // START B
const C128_STOP    = 106; // STOP
// Code B: valor del símbolo = ASCII - 32 (para chars 32-127)

function code128B_encode(text){
  // Construir array de índices de símbolos
  const symbols = [C128_START_B];
  let checksum = C128_START_B;
  for(let i = 0; i < text.length; i++){
    const c = text.charCodeAt(i);
    if(c < 32 || c > 127) continue; // ignorar no imprimibles
    const val = c - 32; // índice en tabla Code B
    symbols.push(val);
    checksum += val * (i + 1);
  }
  symbols.push(checksum % 103); // check character
  symbols.push(C128_STOP);      // stop
  return symbols;
}

function generateBarcodeSVG(code, w=180, h=56){
  const text = String(code);
  const symbols = code128B_encode(text);

  // Calcular ancho total en unidades mínimas
  // Cada símbolo = 11 unidades (suma de sus 6 elementos)
  // STOP especial = [2,3,3,1,1,1,2] = 13 unidades
  const STOP_PATTERN = [2,3,3,1,1,1,2];
  let totalUnits = 0;
  for(let i = 0; i < symbols.length - 1; i++){
    totalUnits += 11; // cada símbolo suma 11
  }
  totalUnits += 13; // STOP especial

  // Quiet zones: 10 unidades a cada lado (requisito estándar)
  const quietUnits = 10;
  totalUnits += quietUnits * 2;

  const unit = w / totalUnits;
  const barH = h - 12; // altura de barras
  let x = quietUnits * unit;
  let svgBars = '';

  // Dibujar cada símbolo excepto STOP
  for(let si = 0; si < symbols.length - 1; si++){
    const sym = symbols[si];
    const pat = C128[sym];
    let isBar = true; // empieza con barra
    for(let ei = 0; ei < 6; ei++){
      const bw = pat[ei] * unit;
      if(isBar){
        svgBars += `<rect x="${x.toFixed(3)}" y="0" width="${bw.toFixed(3)}" height="${barH}" fill="#000"/>`;
      }
      x += bw;
      isBar = !isBar;
    }
  }

  // Dibujar STOP especial (7 elementos)
  let isBar = true;
  for(let ei = 0; ei < 7; ei++){
    const bw = STOP_PATTERN[ei] * unit;
    if(isBar){
      svgBars += `<rect x="${x.toFixed(3)}" y="0" width="${bw.toFixed(3)}" height="${barH}" fill="#000"/>`;
    }
    x += bw;
    isBar = !isBar;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block;shape-rendering:crispEdges">
    <rect width="${w}" height="${h}" fill="white"/>
    ${svgBars}
    <text x="${w/2}" y="${h}" text-anchor="middle" font-family="monospace" font-size="9" fill="#222">${text}</text>
  </svg>`;
}

// HELPERS
// ════════════════════════════════════════════════════════════
function hoy(){ return new Date().toLocaleDateString("es-AR"); }
function ahora(){ return new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
function ahoraShort(){ return new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}); }
function nowTs(){ return Date.now(); }

function getAttToday(alumnoId){
  return S.todayAtt[alumnoId] || {entradas:[],salidas:[],excedido:false,horas_totales:0};
}

function calcHorasHoy(alumnoId){
  const att = S.todayAtt[alumnoId];
  if(!att || att.entradas.length===0) return 0;
  let total = 0;
  att.entradas.forEach((ent,i)=>{
    const sal = att.salidas[i];
    if(sal){
      total += (sal.ts - ent.ts)/3600000;
    } else {
      // still inside
      total += (Date.now() - ent.ts)/3600000;
    }
  });
  return total;
}

function getEstadoActual(alumnoId){
  const att = S.todayAtt[alumnoId];
  if(!att || att.entradas.length===0) return "ausente";
  if(att.entradas.length > att.salidas.length) return "presente";
  return "retirado";
}

// ════════════════════════════════════════════════════════════
// SCAN LOGIC
// ════════════════════════════════════════════════════════════
function processScan(code){
  const alumnoId = parseInt(code);
  const al = S.alumnos.find(a=>a.id===alumnoId);
  if(!al){
    S.scanResult = {tipo:"error", msg:"Código no encontrado: "+code};
    render(); return;
  }

  if(!S.todayAtt[alumnoId]){
    S.todayAtt[alumnoId] = {entradas:[],salidas:[],excedido:false,horas_totales:0};
  }
  const att = S.todayAtt[alumnoId];
  const ts = nowTs();
  const hora = ahoraShort();
  const fecha = hoy();

  // Alternating logic: if more entries than exits → register exit
  if(att.entradas.length > att.salidas.length){
    // SALIDA
    att.salidas.push({ts, hora, fecha});
    const horas = calcHorasHoy(alumnoId);
    att.horas_totales = horas;
    att.excedido = horas > al.horas_contratadas;

    S.scanLog.push({id:Date.now(),alumno_id:alumnoId,tipo:"salida",fecha,hora,ts});
    S.scanResult = {
      tipo:"salida", al,
      msg:`Egreso registrado — ${hora}`,
      horas: horas.toFixed(2),
      hc: al.horas_contratadas,
      excedido: att.excedido
    };
    if(att.excedido){
      showToast(`⚠️ ${al.nombre} excedió sus horas contratadas`,"🔴");
    }
  } else {
    // ENTRADA
    // Validate: don't allow double entry
    if(att.entradas.length > 0 && att.entradas.length === att.salidas.length){
      // already has matched pairs — ok to enter again
    }
    att.entradas.push({ts, hora, fecha});
    S.scanLog.push({id:Date.now(),alumno_id:alumnoId,tipo:"entrada",fecha,hora,ts});
    S.scanResult = {
      tipo:"entrada", al,
      msg:`Ingreso registrado — ${hora}`,
      horas: calcHorasHoy(alumnoId).toFixed(2),
      hc: al.horas_contratadas,
      excedido: false
    };
  }
  render();
}

  if(p==="ver-asistencia") return verAsistenciaPage();
  if(p==="historial") return historialPage();
  if(p==="cursos") return cursosPage();
  if(p==="asistencia"&&S.selectedCurso) return asistenciaPage();
  if(p==="reportes") return reportesPage();
  if(p==="alumnos") return alumnosPage();
  if(p==="maestras") return maestrasPage();
  if(p==="mis-reportes") return misReportesPage();
  return cursosPage();
}

// ════════════════════════════════════════════════════════════
// SCANNER PAGE
// ════════════════════════════════════════════════════════════
function scannerPage(){
  const todayLog = S.scanLog.filter(l=>l.fecha===hoy()).reverse().slice(0,10);
  const res = S.scanResult;

  let resultHTML="";
  if(res){
    if(res.tipo==="error"){
      resultHTML=`<div class="scan-result error"><div class="scan-name">❌ Error</div><div class="scan-info">${res.msg}</div></div>`;
    } else {
      const icon = res.tipo==="entrada"?"▶ INGRESO":"⏹ EGRESO";
      const color = res.tipo==="entrada"?"entrada":"salida";
      const exc = res.excedido ? `<div style="margin-top:6px;background:rgba(198,40,40,0.3);border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700">🔴 EXCEDIÓ horas contratadas (${res.hc}h)</div>`:"";
      resultHTML=`<div class="scan-result ${color}">
        <div style="font-size:11px;opacity:0.7;margin-bottom:2px">${icon}</div>
        <div class="scan-name">${res.al.nombre}</div>
        <div class="scan-info">${res.al.sala} · ${res.msg}</div>
        <div style="margin-top:4px;font-size:11px;opacity:0.8">Horas hoy: ${res.horas}h / ${res.hc}h contratadas</div>
        ${exc}
      </div>`;
    }
  }

  // Recent log
  const logHTML = todayLog.length===0
    ? `<div class="empty" style="padding:20px"><span style="font-size:32px">📡</span><p style="font-size:12px;margin-top:6px">Sin registros hoy</p></div>`
    : todayLog.map(l=>{
        const al=S.alumnos.find(a=>a.id===l.alumno_id);
        const att=S.todayAtt[l.alumno_id];
        const exc=att&&att.excedido&&l.tipo==="salida";
        return `<div class="log-entry">
          <div class="log-dot ${l.tipo}"></div>
          <div class="log-info">
            <div class="log-name">${al?al.nombre:"ID: "+l.alumno_id}</div>
            <div class="log-time">${l.tipo==="entrada"?"Ingreso":"Egreso"} · ${l.hora} · ${al?al.sala:""}</div>
          </div>
          <div class="log-badge">${exc?`<span class="badge b-red">Excedido</span>`:l.tipo==="entrada"?`<span class="badge b-green">Entrada</span>`:`<span class="badge b-orange">Salida</span>`}</div>
        </div>`;
      }).join("");

  // Stats
  const presentes=S.alumnos.filter(a=>getEstadoActual(a.id)==="presente").length;
  const retirados=S.alumnos.filter(a=>getEstadoActual(a.id)==="retirado").length;
  const excedidos=S.alumnos.filter(a=>{const att=S.todayAtt[a.id];return att&&att.excedido;}).length;

  return `
    <div class="g4" style="margin-bottom:14px">
      <div class="stat"><div class="stat-ico" style="background:#e8f5e9">✅</div><div><div class="stat-val" style="color:var(--green)">${presentes}</div><div class="stat-lbl">Adentro ahora</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:#fff3e0">🏃</div><div><div class="stat-val" style="color:var(--orange)">${retirados}</div><div class="stat-lbl">Se fueron hoy</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--red-bg)">🔴</div><div><div class="stat-val" style="color:var(--red)">${excedidos}</div><div class="stat-lbl">Con exceso</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:#f7f3ff">📡</div><div><div class="stat-val">${S.scanLog.filter(l=>l.fecha===hoy()).length}</div><div class="stat-lbl">Escaneos hoy</div></div></div>
    </div>

    <div class="g2" style="align-items:start">
      <div>
        <div class="scanner-box">
          <div style="font-size:11px;opacity:0.6;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Escáner activo</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;opacity:0.9">Posicioná el cursor aquí y escaneá</div>
          <input id="scanner-input" class="scanner-input" placeholder="Apuntá el lector de código aquí..." autocomplete="off" />
          ${resultHTML}
          <div style="margin-top:14px;border-top:1px solid rgba(255,255,255,0.1);padding-top:10px">
            <div style="font-size:10px;opacity:0.5;margin-bottom:6px">PRUEBA MANUAL</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">
              ${S.alumnos.slice(0,4).map(a=>`<button onclick="processScan(${a.id});document.getElementById('scanner-input').value='';document.getElementById('scanner-input').focus()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:inherit">
                ${a.nombre.split(' ')[0]}
              </button>`).join("")}
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title">📋 Últimos registros de hoy</div></div>
        <div style="padding:10px 12px;max-height:340px;overflow-y:auto">${logHTML}</div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// VER ASISTENCIA (DIRECTORA)
// ════════════════════════════════════════════════════════════
function verAsistenciaPage(){
  const cu=CURSOS.find(c=>c.id===S.asistenciaViewCurso)||CURSOS[0];
  const als=S.alumnos.filter(a=>a.curso===S.asistenciaViewCurso);

  const salabtns=CURSOS.map(c=>{
    const exc=S.alumnos.filter(a=>a.curso===c.id&&S.todayAtt[a.id]&&S.todayAtt[a.id].excedido).length;
    return `<button class="sala-btn ${S.asistenciaViewCurso===c.id?"active":""}" data-view-curso="${c.id}">
      ${c.emoji} ${c.nombre}${exc>0?` <span style="background:#c62828;color:#fff;font-size:9px;padding:1px 4px;border-radius:8px">${exc}</span>`:""}
    </button>`;
  }).join("");

  const pres=als.filter(a=>getEstadoActual(a.id)==="presente").length;
  const ret=als.filter(a=>getEstadoActual(a.id)==="retirado").length;
  const aus=als.filter(a=>getEstadoActual(a.id)==="ausente").length;
  const exc=als.filter(a=>S.todayAtt[a.id]&&S.todayAtt[a.id].excedido).length;

  const rows=als.map(a=>{
    const att=S.todayAtt[a.id];
    const est=getEstadoActual(a.id);
    const hT=calcHorasHoy(a.id);
    const hC=a.horas_contratadas;
    const pct=hC>0?Math.min((hT/hC)*100,120):0;
    const excedido=att&&att.excedido;
    const barClass=pct>100?"hf-over":pct>80?"hf-warn":"hf-ok";

    let estBadge=est==="presente"?`<span class="badge b-green">✅ Presente</span>`:
                 est==="retirado"?`<span class="badge b-blue">🏃 Retirado</span>`:
                 `<span class="badge b-gray">— Ausente</span>`;

    const ultimaEntrada=att&&att.entradas.length>0?att.entradas[att.entradas.length-1].hora:"—";
    const ultimaSalida=att&&att.salidas.length>0?att.salidas[att.salidas.length-1].hora:"—";

    const excBadge=excedido?`<span class="badge b-red">🔴 +${(hT-hC).toFixed(1)}h exceso</span>`:
      (hT>0&&pct>80)?`<span class="badge b-gold">⚠️ ${(hC-hT).toFixed(1)}h quedan</span>`:
      hT>0?`<span class="badge b-green">✔ ${(hC-hT).toFixed(1)}h libres</span>`:"";

    return `<tr class="${excedido?"exceeded":""}">
      <td><div style="font-weight:700;font-size:12px">${a.nombre}</div><div style="font-size:10px;color:#999">DNI: ${a.dni}</div></td>
      <td>${estBadge}</td>
      <td><div style="font-size:11px;color:var(--green);font-weight:600">${ultimaEntrada}</div></td>
      <td><div style="font-size:11px;color:var(--orange);font-weight:600">${ultimaSalida}</div></td>
      <td>
        <div style="font-size:11px;font-weight:700">${hT>0?hT.toFixed(1)+"h":"-"} / ${hC}h</div>
        ${hT>0?`<div class="hours-bar"><div class="hours-fill ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>`:""}
        <div style="margin-top:2px">${excBadge}</div>
      </td>
      <td>
        <a href="https://wa.me/${a.tel}?text=${encodeURIComponent("Hola "+a.padre+", le escribimos del jardín Cordoncitos Flojos sobre la asistencia de "+a.nombre+" hoy.")}" target="_blank" class="btn-wa btn-xs">💬</a>
      </td>
    </tr>`;
  }).join("");

  return `
    ${exc>0?`<div class="alert-box alert-danger">🔴 <strong>${exc} alumno${exc>1?"s":""} excedió${exc>1?"ron":""} las horas contratadas</strong> en esta sala hoy.</div>`:""}
    <div class="sala-selector">${salabtns}</div>
    <div class="g4" style="margin-bottom:14px">
      <div class="stat"><div class="stat-ico" style="background:${cu.color}">${cu.emoji}</div><div><div class="stat-val">${als.length}</div><div class="stat-lbl">${cu.nombre}</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:#e8f5e9">✅</div><div><div class="stat-val" style="color:var(--green)">${pres}</div><div class="stat-lbl">Presentes</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:#e3f2fd">🏃</div><div><div class="stat-val" style="color:var(--blue)">${ret}</div><div class="stat-lbl">Retirados</div></div></div>
      <div class="stat"><div class="stat-ico" style="background:var(--red-bg)">🔴</div><div><div class="stat-val" style="color:var(--red)">${exc}</div><div class="stat-lbl">Con exceso</div></div></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">👁️ ${cu.nombre} — ${hoy()}</div><div style="font-size:10px;color:#999">Actualiza en tiempo real</div></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Alumno</th><th>Estado</th><th>Última entrada</th><th>Última salida</th><th>Horas / Contratadas</th><th>WA</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// HISTORIAL PAGE
// ════════════════════════════════════════════════════════════
function historialPage(){
  const log=[...S.scanLog].reverse();
  if(log.length===0) return `<div class="empty"><span class="empty-ico">📅</span><h3>Sin registros aún</h3><p>Los ingresos y egresos escaneados aparecerán aquí</p></div>`;

  // Group by alumno for summary
  const resumen={};
  S.alumnos.forEach(a=>{
    const hT=calcHorasHoy(a.id);
    if(hT>0||getEstadoActual(a.id)!=="ausente"){
      resumen[a.id]={al:a,horas:hT,est:getEstadoActual(a.id),excedido:S.todayAtt[a.id]&&S.todayAtt[a.id].excedido};
    }
  });
  const resItems=Object.values(resumen);

  const logRows=log.map(l=>{
    const al=S.alumnos.find(a=>a.id===l.alumno_id);
    const att=S.todayAtt[l.alumno_id];
    const exc=att&&att.excedido&&l.tipo==="salida";
    return `<tr>
      <td>${l.hora}</td>
      <td>${l.fecha}</td>
      <td><strong>${al?al.nombre:"ID: "+l.alumno_id}</strong></td>
      <td>${al?`<span class="pill" style="background:${CURSOS.find(c=>c.id===al.curso)?.color||'#eee'};color:${CURSOS.find(c=>c.id===al.curso)?.accent||'#666'}">${al.sala}</span>`:""}</td>
      <td>${l.tipo==="entrada"?`<span class="badge b-green">▶ Entrada</span>`:`<span class="badge b-orange">⏹ Salida</span>`}</td>
      <td>${exc?`<span class="badge b-red">🔴 Excedido</span>`:""}</td>
    </tr>`;
  }).join("");

  return `
    <div class="g2" style="align-items:start;margin-bottom:16px">
      <div class="card">
        <div class="card-hd"><div class="card-title">📊 Resumen del día — ${hoy()}</div></div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Alumno</th><th>Sala</th><th>Horas hoy</th><th>Contratadas</th><th>Estado</th></tr></thead>
          <tbody>${resItems.length===0?`<tr><td colspan="5" style="text-align:center;color:#999;padding:20px">Sin actividad hoy</td></tr>`:
            resItems.map(r=>{
              const cu=CURSOS.find(c=>c.id===r.al.curso);
              return `<tr class="${r.excedido?"exceeded":""}">
                <td><strong>${r.al.nombre}</strong></td>
                <td><span class="pill" style="background:${cu?.color||'#eee'};color:${cu?.accent||'#666'}">${r.al.sala}</span></td>
                <td><strong>${r.horas.toFixed(1)}h</strong></td>
                <td>${r.al.horas_contratadas}h</td>
                <td>${r.excedido?`<span class="badge b-red">🔴 Excedido</span>`:r.est==="presente"?`<span class="badge b-green">✅ Presente</span>`:`<span class="badge b-blue">🏃 Retirado</span>`}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table></div>
      </div>
      <div class="card">
        <div class="card-hd"><div class="card-title">🕐 Log de eventos — ${hoy()}</div></div>
        <div class="tbl-wrap"><table>
          <thead><tr><th>Hora</th><th>Fecha</th><th>Alumno</th><th>Sala</th><th>Evento</th><th></th></tr></thead>
          <tbody>${logRows}</tbody>
        </table></div>
      </div>
    </div>`;
}

// CURSOS PAGE (MAESTRA)
// ════════════════════════════════════════════════════════════
function cursosPage(){
  const isDir=S.user.role==="directora";
  const lista=isDir?CURSOS:CURSOS.filter(c=>c.id===S.user.curso);
  const pres=cid=>S.alumnos.filter(a=>a.curso===cid&&getEstadoActual(a.id)==="presente").length;
  const aus=cid=>S.alumnos.filter(a=>a.curso===cid&&getEstadoActual(a.id)==="ausente").length;

  const cards=lista.map(c=>{
    const ma=S.maestras.find(m=>m.curso===c.id);
    const total=S.alumnos.filter(a=>a.curso===c.id).length;
    return `<div class="curso-card" data-goto-curso="${c.id}">
      <div class="curso-banner" style="background:${c.color}">${c.emoji}</div>
      <div class="curso-info">
        <div class="curso-nm">${c.nombre}</div>
        <div class="curso-mt">${ma?ma.nombre:"Sin maestra"}</div>
        <div class="curso-pills">
          <span class="pill" style="background:#e8f5e9;color:#2e7d32">✅${pres(c.id)}</span>
          <span class="pill" style="background:#fdf0ef;color:#c8382b">❌${aus(c.id)}</span>

        <div style="margin-top:6px;font-size:10px;color:${c.accent};font-weight:700">${total} alumnos →</div>
      </div>
    </div>`;
  }).join("");
  return `<div class="g3">${cards}</div>`;
}

    const att=S.todayAtt[a.id];
    return `<tr>
      <td><div style="font-weight:700;font-size:12px">${a.nombre}</div>
        <div style="font-size:10px;color:#999">${a.horas_contratadas}h/día</div>
        ${att&&att.entradas.length>0?`<span style="font-size:9px;background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:4px">Ingresó ${att.entradas[att.entradas.length-1].hora}</span>`:""}

      </td>
      <td>${notaG?`<span class="nota-tag">${notaG}</span>`:`<textarea class="nota-in" rows="2" data-nota-id="${a.id}" placeholder="Nota...">${notaT}</textarea>`}</td>
      <td>${notaG?`<span class="badge b-lav">✓</span>`:`<button class="btn btn-lav btn-sm" data-send-id="${a.id}" ${notaT?"":"style='opacity:0.4'"}>Enviar</button>`}</td>

  return `<div class="g4" style="margin-bottom:14px">

  <div class="card">

    <div class="tbl-wrap"><table>
      <thead><tr><th>Alumno</th><th>Asistencia</th><th>Nota</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

  return `<div class="modal-bg" id="modal-bg"><div class="modal" style="max-width:320px">

      <div class="print-area" id="print-area">

          <div style="font-size:32px;margin-bottom:6px">🌸</div>
          <div style="font-size:11px;color:#999;font-weight:700;letter-spacing:0.5px">JARDÍN MATERNAL</div>
          <div style="font-size:14px;font-weight:900;color:var(--coral);margin-top:2px">Cordoncitos Flojos</div>
          <div style="height:1px;background:#eee;margin:10px 0"></div>
          <div class="print-name">${al.nombre}</div>
          <div class="print-info">${cu?cu.nombre:""} · ${al.horas_contratadas}h/día</div>
          <div class="print-info">DNI: ${al.dni}</div>
          <div style="margin:12px auto;display:inline-block">${generateBarcodeSVG(al.id,180,50)}</div>
          <div style="font-size:10px;color:#999;margin-top:4px">ID: ${al.id} · Responsable: ${al.padre}</div>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" id="modal-cancel">Cerrar</button>
      <button class="btn btn-primary" onclick="printCard()">🖨️ Imprimir</button>
    </div>
  </div></div>`;
}

function printCard(){
  const area=document.getElementById("print-area");
  if(!area)return;
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>Carnet</title>
  <style>body{font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;padding:20px}
  .print-card{border:2px solid #ddd;border-radius:12px;padding:20px;text-align:center;width:250px}</style>
  </head><body>${area.innerHTML}</body></html>`);
  win.document.close();
  win.print();
}

// ════════════════════════════════════════════════════════════
// MAESTRAS
// ════════════════════════════════════════════════════════════
function maestrasPage(){
  const cards=S.maestras.map(m=>{

    return `<div class="ma-card">
      <div class="ma-body"><div style="font-size:38px;margin-bottom:5px">👩‍🏫</div>
        <div style="font-size:14px;font-weight:800">${m.nombre}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">@${m.usuario}</div>

// ════════════════════════════════════════════════════════════
// REPORTES
// ════════════════════════════════════════════════════════════
function reportesPage(){
  const tab=S.tab;
  const byS=s=>S.reportes.filter(r=>r.estado===s);
  const n=byS("nuevo").length,p=byS("proceso").length;
  const cards=byS(tab).map(r=>{
    const al=S.alumnos.find(a=>a.id===r.alumno_id);
    const ma=S.maestras.find(m=>m.id===r.maestra_id);
    const cu=CURSOS.find(c=>c.id===r.curso_id);
    if(!al)return"";
    const msg=encodeURIComponent(`Hola ${al.padre}, soy del jardín Cordoncitos Flojos. Queríamos avisarle que hoy ${al.nombre} ${r.descripcion}.`);
    let badge=r.estado==="nuevo"?`<span class="badge b-red">🔴 Nuevo</span>`:r.estado==="proceso"?`<span class="badge b-orange">🟡 En proceso</span>`:`<span class="badge b-green">🟢 Resuelto</span>`;
    let actions=`<a href="https://wa.me/${al.tel}?text=${msg}" target="_blank" class="btn-wa btn-sm">💬 ${al.padre}</a><div style="flex:1"></div>`;
    if(r.estado==="nuevo")actions+=`<button class="btn btn-orange btn-sm" data-est-id="${r.id}" data-est-val="proceso">→ En proceso</button>`;
    if(r.estado==="proceso")actions+=`<button class="btn btn-green btn-sm" data-est-id="${r.id}" data-est-val="resuelto">✓ Resuelto</button>`;
    if(r.estado!=="nuevo")actions+=`<button class="btn btn-ghost btn-sm" data-est-id="${r.id}" data-est-val="nuevo">↩ Nuevo</button>`;
    return `<div class="rep-card ${r.estado}">
      <div class="rep-hd"><div style="display:flex;gap:8px;align-items:flex-start;flex:1">
        <div style="font-size:20px">${cu?.emoji||"📋"}</div>
        <div><div class="rep-nm">${al.nombre}</div><div class="rep-mt">${cu?.nombre} · ${ma?.nombre} · ${r.fecha} ${r.hora||""}</div></div>
      </div>${badge}</div>
      <div class="rep-txt">${r.descripcion}</div>
      <div class="rep-act">${actions}</div>
    </div>`;
  }).join("");
  return `<div class="tabs">
    <button class="tab ${tab==="nuevo"?"on":""}" data-tab="nuevo">🔴 Nuevos ${n?`<span class="tab-c">${n}</span>`:""}</button>
    <button class="tab ${tab==="proceso"?"on":""}" data-tab="proceso">🟡 En proceso ${p?`<span class="tab-c">${p}</span>`:""}</button>
    <button class="tab ${tab==="resuelto"?"on":""}" data-tab="resuelto">🟢 Resueltos</button>
  </div>${byS(tab).length===0?`<div class="empty"><span class="empty-ico">📭</span><h3>Sin reportes aquí</h3></div>`:cards}`;
}

// ════════════════════════════════════════════════════════════
// MIS REPORTES
// ════════════════════════════════════════════════════════════
function misReportesPage(){
  const mine=S.reportes.filter(r=>r.maestra_id===S.user.id).reverse();
  if(!mine.length)return`<div class="empty"><span class="empty-ico">📝</span><h3>Sin reportes aún</h3></div>`;
  return mine.map(r=>{
    const al=S.alumnos.find(a=>a.id===r.alumno_id);
    const cu=CURSOS.find(c=>c.id===r.curso_id);
    if(!al)return"";
    let badge=r.estado==="nuevo"?`<span class="badge b-red">🔴</span>`:r.estado==="proceso"?`<span class="badge b-orange">🟡</span>`:`<span class="badge b-green">🟢</span>`;
    return `<div class="rep-card ${r.estado}">
      <div class="rep-hd"><div style="display:flex;gap:8px;flex:1">
        <div style="font-size:20px">${cu?.emoji||""}</div>
        <div><div class="rep-nm">${al.nombre}</div><div class="rep-mt">${r.fecha} ${r.hora||""}</div></div>
      </div>${badge}</div>
      <div class="rep-txt">${r.descripcion}</div>
    </div>`;
  }).join("");
}

        </div>
        <div class="fgrp"><label>Padre / Madre / Tutor</label><input id="f-pad" value="${e.padre||""}" placeholder="Nombre del responsable"></div>
        <div class="fgrp"><label>Teléfono WhatsApp <span style="color:#999">(con código de país)</span></label><input id="f-tel" value="${e.tel||""}" placeholder="5493511234567"></div>
        <div class="fgrp"><label>⏱️ Horas contratadas por día</label><input id="f-hrs" type="number" min="0.5" max="12" step="0.5" value="${e.horas_contratadas||4}"></div>
        ${e.id?`<div style="padding:10px;background:#f8f8f8;border-radius:8px;text-align:center">

        </div>`:""}
      </div>
      <div class="modal-ft">
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>

  if(d.type==="maestra"){

    const curOpts=CURSOS.map(c=>`<option value="${c.id}" ${(e.curso||1)==c.id?"selected":""}>${c.nombre}</option>`).join("");
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-hd"><div class="modal-t">${e.id?"Editar maestra":"Nueva maestra"}</div><button class="modal-x" id="modal-close">✕</button></div>
      <div class="modal-bd">
        <div class="fgrp"><label>Nombre *</label><input id="f-nom" value="${e.nombre||""}"></div>
        <div class="fgrp-row">
          <div class="fgrp"><label>Usuario *</label><input id="f-usr" value="${e.usuario||""}"></div>
          <div class="fgrp"><label>Contraseña</label><input id="f-pwd" type="password" value="${e.password||""}"></div>
        </div>
        <div class="fgrp"><label>Sala asignada</label><select id="f-cur">${curOpts}</select></div>
      </div>
      <div class="modal-ft">
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save-ma" data-eid="${e.id||""}">${e.id?"Guardar":"Agregar"}</button>
      </div>
    </div></div>`;
  }
  return "";
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
function showToast(msg,ico="✅"){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  const ta=document.getElementById("toast-area");
  if(ta)ta.innerHTML=`<div class="toast">${ico} ${msg}</div>`;
  S.toastTimer=setTimeout(()=>{const t=document.getElementById("toast-area");if(t)t.innerHTML="";},3000);
}

// ════════════════════════════════════════════════════════════
// BIND ALL EVENTS
// ════════════════════════════════════════════════════════════
function bindAll(){
  // Menu toggle
  const mt=document.getElementById("menu-toggle-btn");
  if(mt)mt.onclick=()=>{S.sidebarOpen=!S.sidebarOpen;render();};

  // Overlay
  const ov=document.getElementById("overlay");
  if(ov)ov.onclick=()=>{S.sidebarOpen=false;render();};

  // Logout
  const lb=document.getElementById("logout-btn");
  if(lb)lb.onclick=()=>{
    S.user=null;S.page="scanner";S.sidebarOpen=false;
    S.scanLog=[];S.todayAtt={};S.notas={};S.notaTemp={};S.reportes=[];S.scanResult=null;
    render();
  };

  // Nav
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.onclick=()=>{
      S.page=el.dataset.nav;
      if(el.dataset.nav==="cursos")S.selectedCurso=null;
      if(window.innerWidth<768)S.sidebarOpen=false;
      render();
    };
  });

  // Goto curso
  document.querySelectorAll("[data-goto-curso]").forEach(el=>{
    el.onclick=()=>{
      S.selectedCurso=CURSOS.find(c=>c.id===parseInt(el.dataset.gotoCurso));
      S.page="asistencia";render();
    };
  });

  // Sala selector
  document.querySelectorAll("[data-view-curso]").forEach(btn=>{
    btn.onclick=()=>{S.asistenciaViewCurso=parseInt(btn.dataset.viewCurso);render();};
  });

  // Scanner input — listens for complete scan (Enter or fast input)
  const si=document.getElementById("scanner-input");
  if(si){
    let scanTimer=null;
    si.addEventListener("keydown",e=>{
      if(e.key==="Enter"){
        const val=si.value.trim();
        if(val){processScan(val);si.value="";}
        e.preventDefault();
      }
    });
    si.addEventListener("input",()=>{
      clearTimeout(scanTimer);
      const val=si.value.trim();
      // Auto-process if 4+ digits entered quickly (barcode scanner behavior)
      if(val.length>=4){
        scanTimer=setTimeout(()=>{
          if(si.value.trim()===val){processScan(val);si.value="";}
        },150);
      }
    });
  }

  // Attendance manual buttons (for maestra page)
  document.querySelectorAll("[data-att]").forEach(btn=>{
    btn.onclick=()=>{
      const id=parseInt(btn.dataset.att);
      const val=btn.dataset.val;
      if(!S.todayAtt[id])S.todayAtt[id]={entradas:[],salidas:[],excedido:false,horas_totales:0};
      const att=S.todayAtt[id];
      if(val==="presente"||val==="tarde"){
        if(att.entradas.length===att.salidas.length){
          att.entradas.push({ts:Date.now(),hora:ahoraShort(),fecha:hoy()});
          S.scanLog.push({id:Date.now(),alumno_id:id,tipo:"entrada",fecha:hoy(),hora:ahoraShort(),ts:Date.now()});
        }
      } else {
        // ausente: clear today
        S.todayAtt[id]={entradas:[],salidas:[],excedido:false,horas_totales:0};
      }
      render();
    };
  });

  // Nota
  document.querySelectorAll("[data-nota-id]").forEach(ta=>{
    ta.oninput=()=>{
      S.notaTemp[ta.dataset.notaId]=ta.value;
      const sb=document.querySelector(`[data-send-id="${ta.dataset.notaId}"]`);
      if(sb)sb.style.opacity=ta.value.trim()?"1":"0.4";
    };
  });

  // Enviar nota
  document.querySelectorAll("[data-send-id]").forEach(btn=>{
    btn.onclick=()=>{
      const id=parseInt(btn.dataset.sendId);
      const txt=(S.notaTemp[id]||"").trim();
      if(!txt)return;
      const al=S.alumnos.find(a=>a.id===id);
      S.reportes.push({id:Date.now(),alumno_id:id,maestra_id:S.user.id,fecha:hoy(),hora:ahoraShort(),descripcion:txt,estado:"nuevo",curso_id:S.selectedCurso.id});
      S.notas[id+"_"+hoy()]=txt;
      delete S.notaTemp[id];
      showToast(`Reporte enviado: ${al?.nombre}`);
      render();
    };
  });

  // Tabs
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.onclick=()=>{S.tab=btn.dataset.tab;render();};
  });

  // Estado reportes
  document.querySelectorAll("[data-est-id]").forEach(btn=>{
    btn.onclick=()=>{
      const id=parseInt(btn.dataset.estId),val=btn.dataset.estVal;
      S.reportes=S.reportes.map(r=>r.id===id?{...r,estado:val}:r);
      showToast(`Reporte → ${val}`,"📋");render();
    };
  });

  // Print alumno
  document.querySelectorAll("[data-print-al]").forEach(btn=>{
    btn.onclick=()=>{S.modal={type:"print",alumnoId:parseInt(btn.dataset.printAl)};render();bindModal();};
  });

  // Nuevo alumno
  const nal=document.getElementById("new-al-btn");
  if(nal)nal.onclick=()=>{S.modal={type:"alumno",edit:{}};render();bindModal();};

  // Editar alumno
  document.querySelectorAll("[data-edit-al]").forEach(btn=>{
    btn.onclick=()=>{
      const al=S.alumnos.find(a=>a.id===parseInt(btn.dataset.editAl));
      if(al){S.modal={type:"alumno",edit:al};render();bindModal();}
    };
  });

  // Eliminar alumno
  document.querySelectorAll("[data-del-al]").forEach(btn=>{
    btn.onclick=()=>{
      const al=S.alumnos.find(a=>a.id===parseInt(btn.dataset.delAl));
      if(confirm(`¿Eliminar a ${al?.nombre}?`)){
        S.alumnos=S.alumnos.filter(a=>a.id!==parseInt(btn.dataset.delAl));
        showToast("Alumno eliminado","🗑️");render();
      }
    };
  });

  // Nueva maestra
  const nma=document.getElementById("new-ma-btn");
  if(nma)nma.onclick=()=>{S.modal={type:"maestra",edit:{}};render();bindModal();};

  // Editar maestra
  document.querySelectorAll("[data-edit-ma]").forEach(btn=>{
    btn.onclick=()=>{
      const m=S.maestras.find(x=>x.id===parseInt(btn.dataset.editMa));
      if(m){S.modal={type:"maestra",edit:m};render();bindModal();}
    };
  });

  // Eliminar maestra
  document.querySelectorAll("[data-del-ma]").forEach(btn=>{
    btn.onclick=()=>{
      const m=S.maestras.find(x=>x.id===parseInt(btn.dataset.delMa));
      if(confirm(`¿Eliminar a ${m?.nombre}?`)){
        S.maestras=S.maestras.filter(x=>x.id!==parseInt(btn.dataset.delMa));
        showToast("Maestra eliminada","🗑️");render();
      }
    };
  });
}

function bindModal(){
  const close=()=>{S.modal=null;render();};
  const mc=document.getElementById("modal-close");
  const mca=document.getElementById("modal-cancel");
  const mbg=document.getElementById("modal-bg");
  if(mc)mc.onclick=close;
  if(mca)mca.onclick=close;
  if(mbg)mbg.onclick=e=>{if(e.target===mbg)close();};

  const sal=document.getElementById("modal-save-al");
  if(sal)sal.onclick=()=>{
    const nom=document.getElementById("f-nom").value.trim();
    const dni=document.getElementById("f-dni").value.trim();
    if(!nom||!dni){alert("Nombre y DNI son obligatorios");return;}
    const obj={
      nombre:nom,edad:parseInt(document.getElementById("f-edad").value)||1,
      dni,curso:parseInt(document.getElementById("f-cur").value),
      padre:document.getElementById("f-pad").value.trim(),
      tel:document.getElementById("f-tel").value.trim(),
      horas_contratadas:parseFloat(document.getElementById("f-hrs").value)||4,
    };
    const eid=parseInt(sal.dataset.eid);
    if(eid){
      const cu=CURSOS.find(c=>c.id===obj.curso);
      obj.sala=cu?cu.nombre:"";
      S.alumnos=S.alumnos.map(a=>a.id===eid?{...a,...obj}:a);
      showToast("Alumno actualizado","✏️");
    } else {
      const newId=Math.max(...S.alumnos.map(a=>a.id),1000)+1;
      const cu=CURSOS.find(c=>c.id===obj.curso);
      S.alumnos.push({...obj,id:newId,sala:cu?cu.nombre:""});
      showToast("Alumno agregado — ID: "+newId,"👶");
    }
    S.modal=null;render();
  };

  const sma=document.getElementById("modal-save-ma");
  if(sma)sma.onclick=()=>{
    const nom=document.getElementById("f-nom").value.trim();
    const usr=document.getElementById("f-usr").value.trim();
    if(!nom||!usr){alert("Nombre y usuario son obligatorios");return;}
    const obj={nombre:nom,usuario:usr,password:document.getElementById("f-pwd").value,curso:parseInt(document.getElementById("f-cur").value)};
    const eid=parseInt(sma.dataset.eid);
    if(eid){S.maestras=S.maestras.map(m=>m.id===eid?{...m,...obj}:m);showToast("Maestra actualizada","✏️");}
    else{S.maestras.push({...obj,id:Date.now()});showToast("Maestra agregada","👩‍🏫");}
    S.modal=null;render();
  };
}

// ════════════════════════════════════════════════════════════

S.sidebarOpen=window.innerWidth>=768;
window.addEventListener("resize",()=>{
  if(window.innerWidth>=768&&!S.sidebarOpen){S.sidebarOpen=true;render();}
  if(window.innerWidth<768&&S.sidebarOpen){S.sidebarOpen=false;render();}
});
render();
</script>
